apiVersion: apps/v1
kind: Deployment
metadata:
  name: swasthya-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: swasthya-backend
  template:
    metadata:
      labels:
        app: swasthya-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/swasthya/backend:latest
        ports:
        - containerPort: 5000