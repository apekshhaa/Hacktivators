version: '3.8'
services:
  frontend:
    build:
      context: ../../frontend
    ports:
      - "3000:3000"
  backend:
    build:
      context: ../../backend
    ports:
      - "5000:5000"
  ai-services:
    build:
      context: ../../ai-services
    ports:
      - "8000:8000"
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"